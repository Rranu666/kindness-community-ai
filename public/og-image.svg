<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#030712;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid texture -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- K logo mark -->
  <rect x="80" y="110" width="52" height="52" rx="10" fill="url(#accent)"/>
  <text x="106" y="145" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white" text-anchor="middle">K</text>

  <!-- Foundation name -->
  <text x="150" y="132" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="1">Kindness Community</text>
  <text x="150" y="154" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="3">FOUNDATION</text>

  <!-- Main headline -->
  <text x="80" y="320" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="white">Building</text>
  <text x="80" y="400" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="url(#accent)">Sustainable</text>
  <text x="80" y="480" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="white">Communities</text>

  <!-- Tagline -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.45)" letter-spacing="1">kindnesscommunityfoundation.com</text>

  <!-- Decorative dots -->
  <circle cx="1050" cy="200" r="180" fill="none" stroke="rgba(244,63,94,0.08)" stroke-width="1"/>
  <circle cx="1050" cy="200" r="130" fill="none" stroke="rgba(244,63,94,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="200" r="80" fill="none" stroke="rgba(244,63,94,0.05)" stroke-width="1"/>
  <circle cx="1050" cy="200" r="18" fill="rgba(244,63,94,0.2)"/>
  <circle cx="1050" cy="200" r="8" fill="#f43f5e"/>
</svg>
