<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7C3AED" />
  <title>KindLearn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #7C3AED;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .loader {
      text-align: center;
      color: white;
    }
    .logo {
      width: 80px; height: 80px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 40px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    p  { font-size: 14px; opacity: 0.75; }
  </style>
</head>
<body>
  <!-- Fallback shell shown only if server is unreachable -->
  <div class="loader">
    <div class="logo">📚</div>
    <h1>KindLearn</h1>
    <p>Loading your lessons…</p>
  </div>
</body>
</html>
